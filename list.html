<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>List</h1>

    <h2>Unordered List</h2>
    <ul style="list-style-type: square;">
        <li>1</li>
            <ol> <!-- nested list -->
                <li>1</li>
                <li>2</li>
                <li>3</li>
            </ol>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>

    <h2>OrderedList</h2>
        <ol type="A">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </ol>


        <dl>
            <dt>Ice Tea</dt>
            <dd>Lemon Ice Tea</dd>
            <dt>Hot Tea</dt>
            <dd>Hot Lemon Tea</dd>
        </dl>
        
        <h3>Test 1</h3>  <!--block level element -->
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Maiores,<span>Test 3</span> velit.</p>



</body>
</html>
